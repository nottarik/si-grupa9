version: "3.9"

# Lokalni full-stack izložen kroz Cloudflare Tunnel
# --------------------------------------------------
# Svi eksterni servisi su već u cloudu:
#   - Baza podataka : Supabase
#   - Redis          : Upstash
#   - Vector DB      : Qdrant Cloud
#
# Cloudflared → nginx:80 → /api/* proxied to backend:8000
#                        → /* served as built frontend SPA
#
# Priprema (jednom):
#   cp .cloudflared.env.example .cloudflared.env
#   # Upiši TUNNEL_TOKEN u .cloudflared.env (za named tunnel)
#
# Pokretanje (prvi put — treba buildati):
#   docker-compose -f docker-compose.tunnel.yml up -d --build
# Pokretanje (bez rebuild):
#   docker-compose -f docker-compose.tunnel.yml up -d
# Logovi (tunnel URL):
#   docker-compose -f docker-compose.tunnel.yml logs cloudflared
# Zaustavljanje:
#   docker-compose -f docker-compose.tunnel.yml down

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.tunnel
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ""   # empty = same-origin; nginx proxies /api/ to backend
    volumes:
      - ./nginx/nginx.tunnel.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    # Quick Tunnel — ne treba domena ni nalog, URL se pojavi u logovima
    # Za named tunnel promijeni u: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate --protocol http2 --url http://frontend:80
    depends_on:
      - frontend
    restart: unless-stopped
