version: "3.9"

# Lokalni backend izložen kroz Cloudflare Tunnel
# -----------------------------------------------
# Svi eksterni servisi su već u cloudu:
#   - Baza podataka : Supabase
#   - Redis          : Upstash
#   - Vector DB      : Qdrant Cloud
# Nema potrebe za lokalnim db/redis/qdrant/nginx/certbot kontejnerima.
#
# Priprema (jednom):
#   cp .cloudflared.env.example .cloudflared.env
#   # Upiši TUNNEL_TOKEN u .cloudflared.env
#
# Pokretanje:    docker-compose -f docker-compose.tunnel.yml up -d
# Logovi:        docker-compose -f docker-compose.tunnel.yml logs -f
# Zaustavljanje: docker-compose -f docker-compose.tunnel.yml down

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    env_file:
      - ./backend/.env.tunnel
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env.tunnel
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    # Quick Tunnel — ne treba domena ni nalog, URL se pojavi u logovima
    # Promijeni u "tunnel --no-autoupdate run" + env_file ako ikad imaš vlastitu domenu
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
