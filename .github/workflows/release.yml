name: Release

# Triggers a CI check on tag push or manual dispatch.
# Frontend is deployed via Cloudflare Pages from g9chatbot.com.
# Backend is hosted locally and exposed via Cloudflare Tunnel.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Release notes / reason"
        required: false
        default: "Manual deploy"

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yml
